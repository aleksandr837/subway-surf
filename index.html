<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Subway Surf 3D</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; }
        canvas { display: block; }
        #loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif; font-size: 24px; color: white;
            background: rgba(0,0,0,0.8); padding: 20px; border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="loading">ЗАГРУЗКА ИГРЫ...</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

        const CONFIG = {
            laneWidth: 150,
            jumpForce: 15,
            gravity: 0.8,
            moveSpeed: 10,
            spawnZ: -3000,
            groundY: 0
        };

        class SubwayGame {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.background = new THREE.Color(0x87ceeb);
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
                this.camera.position.set(0, 250, 600);
                this.camera.lookAt(0, 150, 0);

                this.renderer = new THREE.WebGLRenderer({ antialias: true });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(this.renderer.domElement);

                this.player = null;
                this.lane = 1; // 0, 1, 2
                this.isJumping = false;
                this.velocity = 0;
                this.assets = {};
                this.trains = [];
                this.coins = [];
                this.lastSpawnTime = 0;

                this.initLoaders();
                this.initLights();
                this.loadModels();
                this.setupControls();
            }

            initLoaders() {
                // Настройка Draco для сжатых моделей
                const dracoLoader = new DRACOLoader();
                dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
                
                this.loader = new GLTFLoader();
                this.loader.setDRACOLoader(dracoLoader);
            }

            initLights() {
                const sun = new THREE.DirectionalLight(0xffffff, 1.5);
                sun.position.set(100, 500, 100);
                this.scene.add(sun);
                this.scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            }

            async loadModels() {
                try {
                    const models = ['character', 'train', 'street', 'tunnel', 'coin'];
                    for (const name of models) {
                        const gltf = await this.loader.loadAsync(`${name}.glb`);
                        this.assets[name] = gltf.scene;
                    }

                    this.setupPlayer();
                    this.createEnvironment();
                    document.getElementById('loading').style.display = 'none';
                    this.animate();
                } catch (error) {
                    console.error('Ошибка загрузки:', error);
                }
            }

            setupPlayer() {
                this.player = this.assets.character;
                this.player.scale.set(8.5, 8.5, 8.5);
                this.player.position.set(0, CONFIG.groundY, 0);
                this.scene.add(this.player);
            }

            createEnvironment() {
                const street = this.assets.street;
                street.scale.set(10, 10, 10);
                this.scene.add(street);

                const tunnel = this.assets.tunnel;
                tunnel.scale.set(10, 10, 10);
                tunnel.position.z = -1500;
                this.scene.add(tunnel);
            }

            setupControls() {
                window.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowLeft' && this.lane > 0) this.lane--;
                    if (e.key === 'ArrowRight' && this.lane < 2) this.lane++;
                    if ((e.key === 'ArrowUp' || e.key === ' ') && !this.isJumping) {
                        this.isJumping = true;
                        this.velocity = CONFIG.jumpForce;
                    }
                });
            }

            animate(time = 0) {
                requestAnimationFrame((t) => this.animate(t));

                if (!this.player) return;

                // Движение игрока по линиям
                const targetX = (this.lane - 1) * CONFIG.laneWidth;
                this.player.position.x += (targetX - this.player.position.x) * 0.2;

                // Прыжок
                if (this.isJumping) {
                    this.player.position.y += this.velocity;
                    this.velocity -= CONFIG.gravity;
                    if (this.player.position.y <= CONFIG.groundY) {
                        this.player.position.y = CONFIG.groundY;
                        this.isJumping = false;
                    }
                }

                // СПАВН: Быстрый старт и запрет на 3 вагона в ряд
                if(time - this.lastSpawnTime > 1150 || (this.lastSpawnTime === 0 && time > 100)) { 
                    let lanes = [0, 1, 2];
                    lanes.sort(() => Math.random() - 0.5);
                    
                    // Максимум 2 вагона, чтобы всегда был проход
                    const count = Math.random() > 0.5 ? 2 : 1; 

                    for(let i = 0; i < count; i++) {
                        const train = this.assets.train.clone();
                        train.position.set((lanes[i] - 1) * CONFIG.laneWidth, CONFIG.groundY, CONFIG.spawnZ);
                        train.rotation.y = Math.PI;
                        this.scene.add(train);
                        this.trains.push(train);
                    }

                    // Монетка на свободную линию
                    const coinLane = lanes[2]; 
                    const coin = this.assets.coin.clone();
                    coin.position.set((coinLane - 1) * CONFIG.laneWidth, CONFIG.groundY + 15, CONFIG.spawnZ + 400);
                    coin.scale.set(5.5, 5.5, 5.5);
                    this.scene.add(coin);
                    this.coins.push(coin);

                    this.lastSpawnTime = time;
                }

                // Движение объектов
                this.trains.forEach((train, index) => {
                    train.position.z += CONFIG.moveSpeed * 2;
                    if (train.position.z > 1000) {
                        this.scene.remove(train);
                        this.trains.splice(index, 1);
                    }
                });

                this.coins.forEach((coin, index) => {
                    coin.position.z += CONFIG.moveSpeed * 2;
                    coin.rotation.y += 0.05;
                    if (coin.position.z > 1000) {
                        this.scene.remove(coin);
                        this.coins.splice(index, 1);
                    }
                });

                this.renderer.render(this.scene, this.camera);
            }
        }

        // ЗАПУСК ПОСЛЕ ЗАГРУЗКИ ОКНА
        window.onload = () => {
            new SubwayGame();
        };
    </script>
</body>
</html>
