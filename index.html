<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway: Camera Follow & Pro Zoom</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #score-box { display: inline-block; background: rgba(0,0,0,0.85); padding: 10px 25px; border-radius: 50px; color: #ffcc00; font-size: 28px; font-family: 'Arial Black', sans-serif; border: 3px solid #ffcc00; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #fff; display: flex; justify-content: center; align-items: center; z-index: 1000; font-family: sans-serif; }
    </style>
</head>
<body>

<div id="loading">НАСТРОЙКА ОБЗОРА...</div>
<div id="ui"><div id="score-box">СЧЕТ: <span id="score">0</span></div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const CONFIG = {
        groundY: 125,
        laneWidth: 31.0, 
        speed: 8.2,         // Чуть помедленнее
        jumpForce: 1.85,
        gravity: 0.08,
        segmentLength: 800,
        spawnZ: -3500,
        playerScale: 8.5
    };

    class SubwayGame {
        constructor() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x87CEEB); 
            this.scene.fog = new THREE.Fog(0x87CEEB, 250, 1800);

            this.camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 10000);
            // КАМЕРА: Еще ближе к игроку (Z=58) и ниже (Y=162)
            this.camera.position.set(0, CONFIG.groundY + 37, 58); 

            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setPixelRatio(window.devicePixelRatio);
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(this.renderer.domElement);

            this.assets = {};
            this.trains = [];
            this.coins = [];
            this.mapSegments = [];
            this.lastSpawnTime = 0;
            this.state = { lane: 1, score: 0, alive: true, vY: 0, jumping: false };
            this.touchStart = { x: 0, y: 0 };

            this.initLights();
            this.load();
            this.bindControls();
            window.addEventListener('resize', () => this.onResize());
        }

        onResize() {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        }

        initLights() {
            this.scene.add(new THREE.AmbientLight(0xffffff, 2.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.3);
            sun.position.set(50, 500, 100);
            this.scene.add(sun);
        }

        async load() {
            const loader = new GLTFLoader();
            try {
                const [char, tr, str, tun, c] = await Promise.all([
                    loader.loadAsync('character.glb'),
                    loader.loadAsync('train.glb'),
                    loader.loadAsync('street.glb'),
                    loader.loadAsync('tunnel.glb'),
                    loader.loadAsync('coin.glb')
                ]);

                this.assets.player = char.scene;
                this.assets.player.scale.set(CONFIG.playerScale, CONFIG.playerScale, CONFIG.playerScale);
                this.assets.player.position.set(0, CONFIG.groundY, 0); 
                this.assets.player.rotation.y = Math.PI;
                this.scene.add(this.assets.player);

                this.mixer = new THREE.AnimationMixer(this.assets.player);
                if(char.animations[0]) this.mixer.clipAction(char.animations[0]).play();

                this.assets.train = tr.scene;
                this.assets.street = str.scene;
                this.assets.tunnel = tun.scene;
                this.assets.coin = c.scene;

                for(let i = 0; i < 8; i++) {
                    const isTunnel = i > 4;
                    const model = isTunnel ? this.assets.tunnel.clone() : this.assets.street.clone();
                    model.scale.set(1.5, 1.5, 1.5);
                    model.position.set(-170, 0, -i * CONFIG.segmentLength); 
                    this.scene.add(model);
                    this.mapSegments.push(model);
                }

                document.getElementById('loading').style.display = 'none';
                this.animate(0);
            } catch (err) { console.error(err); }
        }

        bindControls() {
            // ПК УПРАВЛЕНИЕ: A, D, Пробел + Стрелки
            window.addEventListener('keydown', (e) => {
                if(!this.state.alive) return;
                const key = e.key.toLowerCase();
                if((key === 'a' || e.key === 'ArrowLeft') && this.state.lane > 0) this.state.lane--;
                if((key === 'd' || e.key === 'ArrowRight') && this.state.lane < 2) this.state.lane++;
                if((key === ' ' || key === 'w' || e.key === 'ArrowUp') && !this.state.jumping) {
                    this.state.jumping = true;
                    this.state.vY = CONFIG.jumpForce;
                }
            });

            // МОБИЛЬНОЕ УПРАВЛЕНИЕ (Свайпы)
            window.addEventListener('touchstart', (e) => {
                this.touchStart.x = e.touches[0].clientX;
                this.touchStart.y = e.touches[0].clientY;
            });

            window.addEventListener('touchend', (e) => {
                const dx = e.changedTouches[0].clientX - this.touchStart.x;
                const dy = e.changedTouches[0].clientY - this.touchStart.y;
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (Math.abs(dx) > 30) {
                        if (dx > 0 && this.state.lane < 2) this.state.lane++;
                        else if (dx < 0 && this.state.lane > 0) this.state.lane--;
                    }
                } else if (dy < -30 && !this.state.jumping) {
                    this.state.jumping = true;
                    this.state.vY = CONFIG.jumpForce;
                }
            });
        }

        animate(time) {
            if(!this.state.alive) return;
            requestAnimationFrame((t) => this.animate(t));

            if(this.mixer) this.mixer.update(0.016);

            this.mapSegments.forEach(seg => {
                seg.position.z += CONFIG.speed;
                if(seg.position.z > CONFIG.segmentLength) seg.position.z -= CONFIG.segmentLength * this.mapSegments.length;
            });

            // Движение игрока
            const targetX = (this.state.lane - 1) * CONFIG.laneWidth;
            this.assets.player.position.x += (targetX - this.assets.player.position.x) * 0.18;

            // КАМЕРА СЛЕДУЕТ ЗА ИГРОКОМ: жесткая привязка по оси X
            this.camera.position.x = this.assets.player.position.x;

            if(this.state.jumping) {
                this.assets.player.position.y += this.state.vY;
                this.state.vY -= CONFIG.gravity;
                if(this.assets.player.position.y <= CONFIG.groundY) {
                    this.assets.player.position.y = CONFIG.groundY;
                    this.state.jumping = false;
                }
            }

            // СПАВН: Быстрый старт (1 сек) и частый спавн
            if(time - this.lastSpawnTime > 1150) { 
                let lanes = [0, 1, 2];
                lanes.sort(() => Math.random() - 0.5);
                const count = Math.random() > 0.6 ? 2 : 1; 

                for(let i = 0; i < count; i++) {
                    const train = this.assets.train.clone();
                    train.position.set((lanes[i] - 1) * CONFIG.laneWidth, CONFIG.groundY, CONFIG.spawnZ);
                    train.rotation.y = Math.PI;
                    this.scene.add(train);
                    this.trains.push(train);
                }

                const coinLane = lanes[2]; 
                const coin = this.assets.coin.clone();
                coin.position.set((coinLane - 1) * CONFIG.laneWidth, CONFIG.groundY + 15, CONFIG.spawnZ + 400);
                coin.scale.set(5.5, 5.5, 5.5);
                this.scene.add(coin);
                this.coins.push(coin);

                this.lastSpawnTime = time;
            }

            this.trains.forEach((t, i) => {
                t.position.z += CONFIG.speed + 2.5;
                if(Math.abs(t.position.z - this.assets.player.position.z) < 32 && 
                   Math.abs(t.position.x - this.assets.player.position.x) < 12 &&
                   this.assets.player.position.y < CONFIG.groundY + 22) {
                    this.state.alive = false;
                    alert("КОНЕЦ ИГРЫ! Счёт: " + this.state.score);
                    location.reload();
                }
                if(t.position.z > 500) { this.scene.remove(t); this.trains.splice(i, 1); }
            });

            this.coins.forEach((c, i) => {
                c.position.z += CONFIG.speed;
                c.rotation.y += 0.06;
                if(Math.abs(c.position.z - this.assets.player.position.z) < 22 && 
                   Math.abs(c.position.x - this.assets.player.position.x) < 16) {
                    this.state.score += 10;
                    document.getElementById('score').innerText = this.state.score;
                    this.scene.remove(c);
                    this.coins.splice(i, 1);
                }
                if(c.position.z > 500) { this.scene.remove(c); this.coins.splice(i, 1); }
            });

            // Направляем взгляд чуть впереди игрока
            this.camera.lookAt(this.assets.player.position.x, CONFIG.groundY + 30, -500);
            this.renderer.render(this.scene, this.camera);
        }
    }
    new SubwayGame();
</script>
</body>
</html>
