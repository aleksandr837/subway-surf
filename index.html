<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway: Click to Start</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 5%; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #score-box { display: inline-block; background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 30px; color: #fff; font-family: sans-serif; font-weight: bold; border: 2px solid #fff; }
        #overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; font-family: sans-serif; cursor: pointer; }
        #overlay h1 { font-size: 48px; margin-bottom: 10px; color: #ffcc00; }
        #overlay p { font-size: 20px; }
    </style>
</head>
<body>

<div id="overlay">
    <h1 id="status">ЗАГРУЗКА...</h1>
    <p id="sub-status">Подожди пару секунд</p>
</div>

<div id="ui"><div id="score-box">СЧЕТ: <span id="score">0</span></div></div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    const CONFIG = {
        groundY: 125,
        laneWidth: 32,
        speed: 9.0,
        jumpForce: 1.8,
        gravity: 0.08,
        spawnZ: -1200,
        playerScale: 8.5
    };

    class Game {
        constructor() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x87CEEB);
            this.scene.fog = new THREE.Fog(0x87CEEB, 200, 2000);

            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 5000);
            this.camera.position.set(0, CONFIG.groundY + 40, 70);

            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(this.renderer.domElement);

            this.assets = {};
            this.trains = [];
            this.state = { lane: 1, score: 0, alive: true, vY: 0, jumping: false, started: false };
            
            this.init();
            this.load();
        }

        init() {
            this.scene.add(new THREE.AmbientLight(0xffffff, 2.5));
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(200, 10000),
                new THREE.MeshBasicMaterial({ color: 0x444444 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.position.y = CONFIG.groundY - 1;
            this.scene.add(floor);
        }

        load() {
            const loader = new GLTFLoader();
            // Загружаем всё по отдельности
            const p1 = loader.loadAsync('character.glb').then(g => {
                this.assets.player = g.scene;
                this.assets.player.scale.set(CONFIG.playerScale, CONFIG.playerScale, CONFIG.playerScale);
                this.assets.player.position.y = CONFIG.groundY;
                this.assets.player.rotation.y = Math.PI;
                this.scene.add(this.assets.player);
                this.mixer = new THREE.AnimationMixer(this.assets.player);
                if(g.animations[0]) this.mixer.clipAction(g.animations[0]).play();
            });

            const p2 = loader.loadAsync('train.glb').then(g => { this.assets.train = g.scene; });
            
            Promise.all([p1, p2]).then(() => {
                const overlay = document.getElementById('overlay');
                document.getElementById('status').innerText = "ГОТОВО!";
                document.getElementById('sub-status').innerText = "Нажми сюда, чтобы начать бег";
                
                // СПАВНИМ ПОЕЗДА ЗАРАНЕЕ, пока игра на паузе
                this.spawnTrain(-600);
                this.spawnTrain(-1200);

                overlay.onclick = () => {
                    overlay.style.display = 'none';
                    this.state.started = true;
                    this.animate();
                };
            });
        }

        spawnTrain(z) {
            const lane = Math.floor(Math.random() * 3);
            const group = new THREE.Group();
            group.position.set((lane - 1) * CONFIG.laneWidth, CONFIG.groundY, z);
            
            if (this.assets.train) {
                const model = this.assets.train.clone();
                model.rotation.y = Math.PI;
                group.add(model);
            }
            this.scene.add(group);
            this.trains.push({ obj: group, lane: lane });
        }

        animate() {
            if(!this.state.alive || !this.state.started) return;
            requestAnimationFrame(() => this.animate());
            
            if(this.mixer) this.mixer.update(0.016);

            // Игрок
            const targetX = (this.state.lane - 1) * CONFIG.laneWidth;
            this.assets.player.position.x += (targetX - this.assets.player.position.x) * 0.15;
            
            if(this.state.jumping) {
                this.assets.player.position.y += this.state.vY;
                this.state.vY -= CONFIG.gravity;
                if(this.assets.player.position.y <= CONFIG.groundY) {
                    this.assets.player.position.y = CONFIG.groundY;
                    this.state.jumping = false;
                }
            }

            // Движение и коллизии
            this.trains.forEach((t, i) => {
                t.obj.position.z += CONFIG.speed;

                if(Math.abs(t.obj.position.z) < 30 && t.lane === this.state.lane && this.assets.player.position.y < CONFIG.groundY + 20) {
                    this.state.alive = false;
                    alert("ИГРА ОКОНЧЕНА! СЧЕТ: " + this.state.score);
                    location.reload();
                }

                if(t.obj.position.z > 200) {
                    this.scene.remove(t.obj);
                    this.trains.splice(i, 1);
                    this.state.score += 10;
                    document.getElementById('score').innerText = this.state.score;
                    this.spawnTrain(CONFIG.spawnZ);
                }
            });

            this.renderer.render(this.scene, this.camera);
        }

        bind() {
            window.addEventListener('keydown', e => {
                const k = e.key.toLowerCase();
                if((k==='a'||e.code==='ArrowLeft') && this.state.lane > 0) this.state.lane--;
                if((k==='d'||e.code==='ArrowRight') && this.state.lane < 2) this.state.lane++;
                if((k===' '||k==='w') && !this.state.jumping) {
                    this.state.jumping = true; 
                    this.state.vY = CONFIG.jumpForce;
                }
            });
        }
    }

    const game = new Game();
    game.bind();
</script>
</body>
</html>
