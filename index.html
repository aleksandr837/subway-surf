<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Surfers Mobile</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; touch-action: none; }
        
        .full-screen { 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        #loading-screen { background-image: url('start.jpg'); justify-content: center; }
        #fail-screen { background-image: url('fail.jpg'); display: none; z-index: 1100; }

        #progress-container { position: absolute; bottom: 8%; width: 70%; height: 12px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: #ffcc00; transition: width 0.3s; }
        #progress-text { position: absolute; bottom: 11%; color: #fff; font-size: 16px; text-shadow: 2px 2px #000; }

        #game-ui { 
            position: absolute; 
            top: 15px; 
            left: 0;
            width: 100%; 
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 100; 
            display: none; 
            pointer-events: none; 
            display: flex;
            justify-content: space-between;
        }

        .stat-box { 
            background: rgba(0,0,0,0.6); 
            padding: 6px 14px; 
            border-radius: 25px; 
            border: 2px solid #fff; 
            color: #fff; 
            font-size: 18px; 
            display: flex; 
            align-items: center; 
        }

        .coin-icon {
            width: 20px; height: 20px; 
            background: radial-gradient(circle at 35% 35%, #fff9c4 0%, #ffeb3b 40%, #fbc02d 70%, #f57f17 100%);
            border-radius: 50%; border: 2px solid #a1811a; margin-right: 8px; 
        }

        .star-icon {
            width: 18px; height: 18px; background: #fff;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            margin-right: 8px;
        }

        #fail-stats { 
            position: absolute; 
            inset: 0; 
            pointer-events: none; 
            z-index: 1105; 
        }
        
        #final-score { 
            position: absolute;
            top: 23.5%; 
            left: 50%;
            transform: translateX(-50%);
            font-size: 45px;
            color: #fff; 
            text-shadow: 3px 3px #000; 
            margin: 0;
        }
        
        #final-coins { 
            position: absolute;
            top: 32,6%; /* Поднял еще чуть-чуть для центровки в серой плашке */
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px; 
            color: #ffcc00; 
            text-shadow: 2px 2px #000;
            margin: 0;
        }
        
        #restart-btn { 
            position: absolute; 
            bottom: 22%; 
            left: 50%;
            transform: translateX(-50%);
            width: 70%; 
            max-width: 250px;
            height: 60px; 
            cursor: pointer; 
            z-index: 2000; 
            background: rgba(255,255,255,0.01); 
        }
    </style>
</head>
<body>

<div id="loading-screen" class="full-screen">
    <div id="progress-text">0%</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
</div>

<div id="game-ui">
    <div id="score-container" class="stat-box"><div class="star-icon"></div><span id="cur-score">0</span></div>
    <div id="coin-container" class="stat-box"><div class="coin-icon"></div><span id="cur-coins">0</span></div>
</div>

<div id="fail-screen" class="full-screen">
    <div id="fail-stats">
        <div id="final-score">0</div>
        <div id="final-coins">0</div>
    </div>
    <div id="restart-btn" onpointerdown="location.reload()"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    const CONFIG = {
        groundY: 125, laneWidth: 31, speed: 8.5, jumpForce: 1.9, gravity: 0.08,
        segmentLength: 800, spawnZ: -900, playerScale: 8.5
    };

    class SubwayGame {
        constructor() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x4488aa);
            this.scene.fog = new THREE.Fog(0x4488aa, 50, 1000);
            this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
            this.camera.position.set(0, CONFIG.groundY + 32, 70); 
            
            this.renderer = new THREE.WebGLRenderer({ antialias: true });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(this.renderer.domElement);

            this.state = { score: 0, coins: 0, alive: true, lane: 1, vY: 0, jumping: false };
            this.assets = {}; this.trains = []; this.coins = []; this.mapSegments = [];
            this.lastSpawnTime = 0;
            this.init();
        }

        async init() {
            const manager = new THREE.LoadingManager();
            const loader = new GLTFLoader(manager);
            const dracoLoader = new DRACOLoader();
            dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
            loader.setDRACOLoader(dracoLoader);

            manager.onProgress = (u, l, t) => {
                const p = Math.floor((l / t) * 100);
                document.getElementById('progress-bar').style.width = p + '%';
                document.getElementById('progress-text').innerText = p + '%';
            };

            manager.onLoad = () => {
                setTimeout(() => {
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('game-ui').style.display = 'flex';
                    this.bindControls();
                    this.animate(0);
                }, 600);
            };

            const load = (p) => new Promise(res => loader.load(p, res));
            try {
                const [char, str, tun, tr, cn] = await Promise.all([
                    load('character.glb'), load('street.glb'), load('tunnel.glb'), load('train.glb'), load('coin.glb')
                ]);
                this.assets = { player: char.scene, street: str.scene, tunnel: tun.scene, train: tr.scene, coin: cn.scene };
                
                this.assets.player.scale.set(CONFIG.playerScale, CONFIG.playerScale, CONFIG.playerScale);
                this.assets.player.position.set(0, CONFIG.groundY, 0);
                this.assets.player.rotation.y = Math.PI;
                this.scene.add(this.assets.player);
                this.mixer = new THREE.AnimationMixer(this.assets.player);
                if(char.animations[0]) this.mixer.clipAction(char.animations[0]).play();

                this.scene.add(new THREE.AmbientLight(0xffffff, 2.8));
                for(let i = 0; i < 6; i++) {
                    const m = (i < 4 ? this.assets.street : this.assets.tunnel).clone();
                    m.scale.set(1.5, 1.5, 1.5);
                    m.position.set(-170, 0, -i * CONFIG.segmentLength);
                    this.scene.add(m);
                    this.mapSegments.push(m);
                }
            } catch(e) { console.error(e); }
        }

        bindControls() {
            window.addEventListener('keydown', (e) => {
                if(!this.state.alive) return;
                if((e.code === 'ArrowLeft' || e.key === 'a') && this.state.lane > 0) this.state.lane--;
                if((e.code === 'ArrowRight' || e.key === 'd') && this.state.lane < 2) this.state.lane++;
                if((e.code === 'ArrowUp' || e.key === 'w' || e.code === 'Space') && !this.state.jumping) {
                    this.state.jumping = true; this.state.vY = CONFIG.jumpForce;
                }
            });

            let sX, sY;
            window.addEventListener('touchstart', e => { sX = e.touches[0].clientX; sY = e.touches[0].clientY; });
            window.addEventListener('touchend', e => {
                if(!this.state.alive) return;
                const dx = e.changedTouches[0].clientX - sX;
                const dy = e.changedTouches[0].clientY - sY;
                if(Math.abs(dx) > Math.abs(dy)) {
                    if(dx > 30 && this.state.lane < 2) this.state.lane++;
                    if(dx < -30 && this.state.lane > 0) this.state.lane--;
                } else if(dy < -40 && !this.state.jumping) {
                    this.state.jumping = true; this.state.vY = CONFIG.jumpForce;
                }
            });
        }

        animate(time) {
            if(!this.state.alive) return;
            requestAnimationFrame(t => this.animate(t));
            if(this.mixer) this.mixer.update(0.016);
            
            this.state.score += 1;
            document.getElementById('cur-score').innerText = Math.floor(this.state.score / 5); 

            this.mapSegments.forEach(s => {
                s.position.z += CONFIG.speed;
                if(s.position.z > CONFIG.segmentLength) s.position.z -= CONFIG.segmentLength * 6;
            });

            const tx = (this.state.lane - 1) * CONFIG.laneWidth;
            this.assets.player.position.x += (tx - this.assets.player.position.x) * 0.15;
            this.camera.position.x = this.assets.player.position.x * 0.5;

            if(this.state.jumping) {
                this.assets.player.position.y += this.state.vY;
                this.state.vY -= CONFIG.gravity;
                if(this.assets.player.position.y <= CONFIG.groundY) {
                    this.assets.player.position.y = CONFIG.groundY;
                    this.state.jumping = false;
                }
            }

            if(time - this.lastSpawnTime > 1200) {
                const safeLane = Math.floor(Math.random() * 3);
                [0,1,2].forEach(l => {
                    if(l !== safeLane && Math.random() > 0.4) {
                        const t = this.assets.train.clone();
                        t.position.set((l-1)*CONFIG.laneWidth, CONFIG.groundY, CONFIG.spawnZ);
                        t.rotation.y = Math.PI;
                        this.scene.add(t);
                        this.trains.push(t);
                    }
                });
                
                for(let i = 0; i < 5; i++) {
                    const c = this.assets.coin.clone();
                    c.position.set((safeLane-1)*CONFIG.laneWidth, CONFIG.groundY + 5, CONFIG.spawnZ + 300 - (i * 45)); 
                    c.scale.set(35, 35, 35); 
                    this.scene.add(c);
                    this.coins.push(c);
                }
                this.lastSpawnTime = time;
            }

            this.trains.forEach((t, i) => {
                t.position.z += CONFIG.speed + 3;
                if(Math.abs(t.position.z - this.assets.player.position.z) < 35 && Math.abs(t.position.x - this.assets.player.position.x) < 15 && this.assets.player.position.y < CONFIG.groundY + 25) this.gameOver();
                if(t.position.z > 200) { this.scene.remove(t); this.trains.splice(i,1); }
            });

            this.coins.forEach((c, i) => {
                c.position.z += CONFIG.speed;
                if(Math.abs(c.position.z - this.assets.player.position.z) < 25 && Math.abs(c.position.x - this.assets.player.position.x) < 20) {
                    this.state.coins++;
                    document.getElementById('cur-coins').innerText = this.state.coins;
                    this.scene.remove(c); this.coins.splice(i,1);
                }
            });

            this.camera.lookAt(this.assets.player.position.x * 0.5, CONFIG.groundY + 20, -100);
            this.renderer.render(this.scene, this.camera);
        }

        gameOver() {
            this.state.alive = false;
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('fail-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = Math.floor(this.state.score / 5);
            document.getElementById('final-coins').innerText = this.state.coins;
        }
    }
    new SubwayGame();
</script>
</body>
</html>
