<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Subway Surfers - Yandex Mobile Fix</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        .full-screen { position: fixed; inset: 0; z-index: 1000; display: flex; flex-direction: column; align-items: center; background-size: cover; background-position: center; }
        #loading-screen { background-image: url('start.jpg'); justify-content: center; background-color: #4488aa; }
        #progress-container { position: absolute; bottom: 15%; width: 70%; height: 20px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ffcc00, #ff6600); transition: width 0.1s; }
        #progress-text { position: absolute; bottom: 19%; color: #fff; font-size: 24px; text-shadow: 2px 2px #000; }
        #game-ui { position: absolute; top: 15px; left: 0; width: 100%; padding: 0 15px; box-sizing: border-box; z-index: 100; display: none; pointer-events: none; justify-content: space-between; }
        .stat-box { background: rgba(0,0,0,0.6); padding: 8px 18px; border-radius: 30px; border: 2px solid #fff; color: #fff; font-size: 22px; display: flex; align-items: center; gap: 8px; }
        #fail-screen { background-image: url('fail.jpg'); display: none; z-index: 1100; }
        #final-score { position: absolute; top: 23.5%; left: 50%; transform: translateX(-50%); font-size: 50px; color: #fff; text-shadow: 3px 3px #000; }
        #final-coins { position: absolute; top: 33%; left: 50%; transform: translateX(-50%); font-size: 35px; color: #ffcc00; text-shadow: 2px 2px #000; }
        #restart-btn { position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%); width: 70%; max-width: 250px; height: 65px; cursor: pointer; z-index: 2000; }
    </style>
</head>
<body>

<div id="loading-screen" class="full-screen">
    <div id="progress-text">0%</div>
    <div id="progress-container"><div id="progress-bar"></div></div>
</div>

<div id="game-ui">
    <div class="stat-box">⭐ <span id="cur-score">0</span></div>
    <div class="stat-box">🪙 <span id="cur-coins">0</span></div>
</div>

<div id="fail-screen" class="full-screen">
    <div id="final-score">0</div>
    <div id="final-coins">0</div>
    <div id="restart-btn" onclick="location.reload()"></div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

    const CONFIG = {
        groundY: 125, laneWidth: 31, speed: 9.3, jumpForce: 2.1, gravity: 0.1,
        segmentLength: 800, spawnZ: -1000, playerScale: 8.5, trainScale: 1.2, coinScale: 40 
    };

    class SubwayGame {
        constructor() {
            this.scene = new THREE.Scene();
            this.scene.background = new THREE.Color(0x4488aa);
            this.scene.fog = new THREE.Fog(0x4488aa, 300, 1400);
            this.camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 5000);
            this.renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
            this.renderer.setSize(window.innerWidth, window.innerHeight);
            this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(this.renderer.domElement);

            this.state = { score: 1, coins: 0, alive: true, lane: 1, vY: 0, jumping: false }; 
            this.models = {}; this.obstacles = []; this.mapSegments = []; this.activeCoins = [];
            this.touchStart = { x: 0, y: 0 };
            this.init();
        }

        async init() {
            const draco = new DRACOLoader();
            draco.setDecoderPath('https://www.gstatic.com/draco/v1/decoders/');
            const loader = new GLTFLoader();
            loader.setDRACOLoader(draco);

            const assets = [
                { id: 'player', path: 'character.glb' }, { id: 'street', path: 'street.glb' },
                { id: 'tunnel', path: 'tunnel.glb' }, 
                { id: 'c1', path: 'carriage1.glb' }, { id: 'c2', path: 'carriage2.glb' }, 
                { id: 'c3', path: 'carriage3.glb' }, { id: 'coin', path: 'coin.glb' }
            ];

            const prgBar = document.getElementById('progress-bar');
            const prgText = document.getElementById('progress-text');

            for (let i = 0; i < assets.length; i++) {
                try {
                    const gltf = await new Promise((res, rej) => loader.load(assets[i].path, res, undefined, rej));
                    
                    if (['c1', 'c2', 'c3', 'coin'].includes(assets[i].id)) {
                        // КРИТИЧЕСКОЕ ИСПРАВЛЕНИЕ ДЛЯ МОБИЛЬНЫХ БРАУЗЕРОВ (Яндекс/Chrome)
                        // Принудительно просчитываем геометрию до вычисления размеров
                        gltf.scene.updateMatrixWorld(true); 

                        const box = new THREE.Box3().setFromObject(gltf.scene);
                        const center = box.getCenter(new THREE.Vector3());
                        const size = box.getSize(new THREE.Vector3());
                        
                        // Если из-за бага телефона размеры 0, ставим дефолтные, чтобы модель не исчезла
                        if (isNaN(center.x) || size.y === 0) {
                            gltf.scene.position.set(0, 0, 0);
                        } else {
                            gltf.scene.position.set(-center.x, -center.y + (size.y / 2), -center.z);
                        }
                        
                        gltf.scene.traverse(child => {
                            if (child.isMesh) {
                                child.material.side = THREE.DoubleSide;
                                child.frustumCulled = false;
                                
                                // Защита материалов от мобильных багов отрисовки
                                if(child.material) {
                                    child.material.transparent = false;
                                    child.material.depthWrite = true;
                                    child.material.needsUpdate = true;
                                }
                            }
                        });

                        const group = new THREE.Group();
                        group.add(gltf.scene);
                        this.models[assets[i].id] = { scene: group };
                    } else {
                        this.models[assets[i].id] = gltf;
                    }
                } catch(e) { console.error("Missing:", assets[i].id); }
                const percent = Math.floor(((i + 1) / assets.length) * 100);
                prgBar.style.width = percent + '%';
                prgText.innerText = percent + '%';
            }
            this.start();
        }

        start() {
            if (this.models.player) {
                this.player = this.models.player.scene;
                this.player.scale.set(CONFIG.playerScale, CONFIG.playerScale, CONFIG.playerScale);
                this.player.position.set(0, CONFIG.groundY, 0); 
                this.player.rotation.y = Math.PI;
                this.scene.add(this.player);
                if (this.models.player.animations.length) {
                    this.mixer = new THREE.AnimationMixer(this.player);
                    this.mixer.clipAction(this.models.player.animations[0]).play();
                }
            }
            this.scene.add(new THREE.AmbientLight(0xffffff, 4.0));
            for (let i = 0; i < 6; i++) {
                const model = (i < 4 ? this.models.street : this.models.tunnel) || this.models.street;
                if (model) {
                    const m = model.scene.clone();
                    m.position.set(-170, 0, -i * CONFIG.segmentLength);
                    m.scale.set(1.5, 1.5, 1.5);
                    this.scene.add(m);
                    this.mapSegments.push(m);
                }
            }
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('game-ui').style.display = 'flex';
            this.bind();
            this.loop();
        }

        bind() {
            window.addEventListener('keydown', e => {
                if (e.code === 'ArrowLeft' || e.code === 'KeyA') this.moveLane(-1);
                if (e.code === 'ArrowRight' || e.code === 'KeyD') this.moveLane(1);
                if (e.code === 'ArrowUp' || e.code === 'Space') this.jump();
            });
            window.addEventListener('touchstart', e => {
                this.touchStart.x = e.touches[0].clientX;
                this.touchStart.y = e.touches[0].clientY;
            });
            window.addEventListener('touchend', e => {
                const dx = e.changedTouches[0].clientX - this.touchStart.x;
                const dy = e.changedTouches[0].clientY - this.touchStart.y;
                if (Math.abs(dx) > Math.abs(dy)) {
                    if (Math.abs(dx) > 30) this.moveLane(dx > 0 ? 1 : -1);
                } else { if (dy < -30) this.jump(); }
            });
        }

        moveLane(dir) { this.state.lane = Math.max(0, Math.min(2, this.state.lane + dir)); }
        jump() { if (!this.state.jumping) { this.state.jumping = true; this.state.vY = CONFIG.jumpForce; } }

        loop() {
            if (!this.state.alive) return;
            requestAnimationFrame(() => this.loop());
            if (this.mixer) this.mixer.update(0.016);
            this.state.score++;
            document.getElementById('cur-score').innerText = Math.floor(this.state.score / 10);
            this.mapSegments.forEach(s => {
                s.position.z += CONFIG.speed;
                if (s.position.z > CONFIG.segmentLength) s.position.z -= CONFIG.segmentLength * 6;
            });
            const targetX = (this.state.lane - 1) * CONFIG.laneWidth;
            this.player.position.x += (targetX - this.player.position.x) * 0.22;
            if (this.state.jumping) {
                this.player.position.y += this.state.vY;
                this.state.vY -= CONFIG.gravity;
                if (this.player.position.y <= CONFIG.groundY) { this.player.position.y = CONFIG.groundY; this.state.jumping = false; }
            }
            this.camera.position.set(this.player.position.x, CONFIG.groundY + 45, 65);
            this.camera.lookAt(this.player.position.x, CONFIG.groundY + 25, -50);
            if (this.state.score % 28 === 0) this.spawn();
            this.updateEntities();
            this.renderer.render(this.scene, this.camera);
        }

        spawn() {
            const l = Math.floor(Math.random() * 3);
            let type;
            const nearbyTrains = this.obstacles.filter(o => Math.abs(o.m.position.z - CONFIG.spawnZ) < 80).length;

            if (nearbyTrains >= 2) {
                type = 'coin';
            } else {
                if (Math.random() > 0.4) {
                    const r = Math.random();
                    if (r < 0.33) type = 'c1';
                    else if (r < 0.66) type = 'c2';
                    else type = 'c3';
                } else { type = 'coin'; }
            }

            if (this.models[type]) {
                const targetX = (l - 1) * CONFIG.laneWidth;
                if (type === 'coin') {
                    for (let i = 0; i < 5; i++) {
                        const m = this.models[type].scene.clone();
                        m.scale.set(CONFIG.coinScale, CONFIG.coinScale, CONFIG.coinScale);
                        m.position.set(targetX, CONFIG.groundY + 12, CONFIG.spawnZ + (i * 38)); 
                        this.activeCoins.push({ m, l });
                        this.scene.add(m);
                    }
                } else {
                    const m = this.models[type].scene.clone();
                    m.scale.set(CONFIG.trainScale, CONFIG.trainScale, CONFIG.trainScale);
                    m.position.set(targetX, CONFIG.groundY + 0.2, CONFIG.spawnZ);
                    this.obstacles.push({ m, l });
                    this.scene.add(m);
                }
            }
        }

        updateEntities() {
            for (let i = this.obstacles.length - 1; i >= 0; i--) {
                const o = this.obstacles[i];
                o.m.position.z += CONFIG.speed + 4;
                if (Math.abs(o.m.position.z - this.player.position.z) < 45 && o.l === this.state.lane) {
                    if (this.player.position.y < CONFIG.groundY + 35) this.die();
                }
                if (o.m.position.z > 200) { this.scene.remove(o.m); this.obstacles.splice(i, 1); }
            }
            for (let i = this.activeCoins.length - 1; i >= 0; i--) {
                const c = this.activeCoins[i];
                c.m.position.z += CONFIG.speed;
                c.m.rotation.y += 0.12;
                if (Math.abs(c.m.position.z - this.player.position.z) < 30 && c.l === this.state.lane) {
                    this.state.coins++;
                    document.getElementById('cur-coins').innerText = this.state.coins;
                    this.scene.remove(c.m); this.activeCoins.splice(i, 1);
                } else if (c.m.position.z > 200) { this.scene.remove(c.m); this.activeCoins.splice(i, 1); }
            }
        }

        die() {
            this.state.alive = false;
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('fail-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = Math.floor(this.state.score / 10);
            document.getElementById('final-coins').innerText = this.state.coins;
        }
    }
    new SubwayGame();
</script>
</body>
</html>
